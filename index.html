<html lang="th">
<head>
<meta charset="UTF-8">

<!-- สำคัญมากสำหรับ iPhone -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
*{
 box-sizing:border-box;
 -webkit-tap-highlight-color:transparent;
}
body{
 margin:0;
 background:#020617;
 font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
 color:white;
}
.app{
 width:100vw;
 height:100vh;
 margin:0 auto;
 position:relative;
 display:flex;
 flex-direction:column;
 max-width:1000px;
}

/* ===== EXPIRY BAR (เพิ่มใหม่ จุดเดียว) ===== */
#expiryBar{
 display:none;
 width:100%;
 text-align:center;
 font-size:12px;
 padding:6px 4px;
 background:#020617;
 color:#facc15;
 border-bottom:1px solid #1f2937;
}

/* ===== LOGIN OVERLAY ===== */
#loginOverlay{
 position:absolute;
 inset:0;
 background:rgba(2,6,23,.97);
 z-index:100000;
 display:flex;
 align-items:center;
 justify-content:center;
}
.loginBox{
 width:280px;
 background:#0f172a;
 padding:20px;
 border-radius:10px;
 text-align:center;
}
.loginBox h2{
 margin:0 0 10px;
}
.loginBox input{
 width:100%;
 height:40px;
 margin-bottom:10px;
 background:#020617;
 border:1px solid #334155;
 color:white;
 border-radius:6px;
 padding:0 10px;
}
.loginBox button{
 width:100%;
 height:42px;
 background:#2563eb;
 border:none;
 color:white;
 font-weight:bold;
 border-radius:6px;
}

/* ===== EXPIRE OVERLAY ===== */
#expireOverlay{
 position:absolute; inset:0;
 background:rgba(2,6,23,.96);
 display:none; z-index:99999;
 align-items:center; justify-content:center;
 flex-direction:column; text-align:center;
}
#expireOverlay h1{font-size:32px;color:#ef4444;margin:0}
#expireOverlay p{margin-top:10px;font-size:16px;color:#cbd5f5}

/* ===== TOP ===== */
.top{
 display:flex;
 flex-direction:column;
 align-items:center;   /* 👈 จัดกึ่งกลาง */
 padding:8px;
 gap:10px;
}
.betbar{
 width:100%;
 font-size:20px;
 font-weight:800;
 padding:10px;
 text-align:center;
 background:#0f172a;
}
.betbar.radarP{animation:radarP 1.2s infinite}
.betbar.radarB{animation:radarB 1.2s infinite}
@keyframes radarP{
 0%{box-shadow:0 0 0 rgba(59,130,246,.9)}
 70%{box-shadow:0 0 18px 8px rgba(59,130,246,.4)}
 100%{box-shadow:0 0 0 rgba(59,130,246,0)}
}
@keyframes radarB{
 0%{box-shadow:0 0 0 rgba(239,68,68,.9)}
 70%{box-shadow:0 0 18px 8px rgba(239,68,68,.4)}
 100%{box-shadow:0 0 0 rgba(239,68,68,0)}
}

.countbar{
 width:100%;
 text-align:center;
 font-size:12px;
 font-weight:bold;
 color:#cbd5f5;
}

.btns{
 width:100%;
 display:flex;
 gap:6px;
}
.btns button{
 flex:1;
 height:44px;
 font-size:16px;
 font-weight:bold;
 background:#1e293b;
 border:none;
 color:white;
 border-radius:6px;
}

/* ===== BODY ===== */
.body{
 flex:1;
 display:flex;
 flex-direction:column;
 overflow:hidden;
}
.left{
 flex:1;
 overflow-y:auto;
 padding:8px;
}
.sys{
 display:flex;
 align-items:center;
 height:30px;
 margin-bottom:4px;
 background:#0b1220;
 font-size:13px;
}
.sys.radar{animation:radar 1s infinite}
@keyframes radar{
 0%{box-shadow:0 0 0 rgba(34,211,238,.8)}
 70%{box-shadow:0 0 12px 6px rgba(34,211,238,.3)}
 100%{box-shadow:0 0 0 rgba(34,211,238,0)}
}
.name{width:60px}
.bet{width:30px;text-align:center}
.pair{flex:1;font-weight:bold}
.hist span{margin-right:2px;font-weight:bold}

/* ===== ROADS ===== */
.right{
 padding:8px;
 background:#020617;
}
canvas{
 width:100%;
 height:120px;
 border:1px solid #1f2937;
 background:black;
}
#bead{background:white}
/* ===== ULTRA PREMIUM COLOR MAJOR ===== */
.colorMajorBox{
 position:relative;
 overflow:hidden;
 padding:22px 20px;
 border-radius:22px;

 width:92%;            /* 👈 ทำให้ยาว */
 max-width:800px;      /* 👈 ไม่ให้เกิน desktop */
 margin:0 auto;        /* 👈 กึ่งกลางแน่นอน */

 background:linear-gradient(145deg,#0f172a,#1e293b);
 border:1px solid rgba(255,255,255,.08);
 backdrop-filter:blur(10px);
 text-align:center;
 transition:.35s ease;
 box-shadow:
   0 15px 40px rgba(0,0,0,.5),
   inset 0 0 25px rgba(255,255,255,.04);
}

/* Animated Shine */
.colorMajorBox::before{
 content:"";
 position:absolute;
 inset:0;
 background:linear-gradient(120deg,
   transparent 0%,
   rgba(255,255,255,.15) 50%,
   transparent 100%);
 transform:translateX(-100%);
 animation:premiumShine 5s linear infinite;
}

@keyframes premiumShine{
 to{transform:translateX(100%)}
}

/* P Mode */
.colorMajorBox.p{
 background:linear-gradient(145deg,#0f172a,#1e3a8a);
 color:#93c5fd;
 box-shadow:
   0 0 40px rgba(59,130,246,.7),
   inset 0 0 30px rgba(59,130,246,.25);
}

/* B Mode */
.colorMajorBox.b{
 background:linear-gradient(145deg,#0f172a,#7f1d1d);
 color:#fca5a5;
 box-shadow:
   0 0 40px rgba(239,68,68,.7),
   inset 0 0 30px rgba(239,68,68,.25);
}

/* Percent Row */
.colorMajorBox .percentRow{
 font-size:14px;
 margin-top:6px;
 opacity:.9;
 letter-spacing:1px;
}

/* Result */
.colorMajorBox .resultRow{
 margin-top:8px;
 font-size:14px;
 font-weight:700;
}

.colorMajorBox .win{
 color:#22c55e;
 text-shadow:0 0 10px rgba(34,197,94,.8);
}

.colorMajorBox .lose{
 color:#ef4444;
 text-shadow:0 0 10px rgba(239,68,68,.8);
}

/* History Grid */
.colorMajorHistory{
 display:grid;
 grid-template-columns:repeat(15, 20px);
 gap:8px;
 justify-content:center;
 margin-top:12px;
}

.cmBox{
 width:20px;
 height:20px;
 border-radius:6px;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:12px;
 font-weight:900;
 color:white;
 transition:.25s;
}

.cmWin{
 background:linear-gradient(135deg,#16a34a,#22c55e);
 box-shadow:0 0 12px rgba(34,197,94,.8);
}

.cmLose{
 background:linear-gradient(135deg,#b91c1c,#ef4444);
 box-shadow:0 0 12px rgba(239,68,68,.8);
}

.cmBox:hover{
 transform:scale(1.15);
}

/* ===== ROBOT AI ===== */
#robotBox{
 background:linear-gradient(145deg,#111827,#1f2937);
 border:1px solid rgba(255,255,255,.06);
}

#robotBox.p{
 background:linear-gradient(145deg,#0f172a,#1e40af);
 box-shadow:0 0 40px rgba(59,130,246,.7),
 inset 0 0 30px rgba(59,130,246,.25);
 color:#93c5fd;
}

#robotBox.b{
 background:linear-gradient(145deg,#0f172a,#7f1d1d);
 box-shadow:0 0 40px rgba(239,68,68,.7),
 inset 0 0 30px rgba(239,68,68,.25);
 color:#fca5a5;
}

.robotConfidence{
 margin-top:6px;
 font-size:14px;
 font-weight:700;
}

.robotMode{
 margin-top:4px;
 font-size:13px;
 opacity:.9;
}
/* ===== ROBOT RESULT HISTORY ===== */
.robotHistory{
 display:flex;
 justify-content:center;
 gap:6px;
 margin-top:10px;
 flex-wrap:wrap;
}

.robotDot{
 width:26px;
 height:26px;
 border-radius:8px;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:14px;
 font-weight:900;
 color:white;
}

.robotWin{
 background:linear-gradient(135deg,#16a34a,#22c55e);
 box-shadow:0 0 12px rgba(34,197,94,.8);
}

.robotLose{
 background:linear-gradient(135deg,#b91c1c,#ef4444);
 box-shadow:0 0 12px rgba(239,68,68,.8);
}

/* ===== % BLING EFFECT ===== */
.percentBlink{
 animation:percentBlink 1s infinite;
 font-weight:900;
 text-shadow:0 0 10px rgba(255,255,255,.9);
}

@keyframes percentBlink{
 0%{opacity:1; transform:scale(1);}
 50%{opacity:.4; transform:scale(1.12);}
 100%{opacity:1; transform:scale(1);}
}

</style>
</head>

<script>
const SYSTEMS=[
["DNA x",h=>h.at(-1)],
["DNA ,",h=>h.at(-1)==="P"?"B":"P"],
["DNA 2",h=>h.length>=2&&h.at(-1)==h.at(-2)?h.at(-1):(h.at(-1)==="P"?"B":"P")],
["DNA /",h=>h.length%2===0?"P":"B"],
["DNA 3",h=>h.length>=3&&new Set(h.slice(-3)).size===1?h.at(-1):(h.at(-1)==="P"?"B":"P")],
["DNA =",h=>h.filter(x=>x==="P").length<=h.filter(x=>x==="B").length?"P":"B"],
["DNA 5",h=>h.slice(-5).filter(x=>x==="P").length>h.slice(-5).filter(x=>x==="B").length?"P":"B"],
["DNA C",h=>h.length>=4&&new Set(h.slice(-4)).size===1?(h.at(-1)==="P"?"B":"P"):h.at(-1)],
["DNA T",h=>h.slice(-6).filter(x=>x==="P").length>h.slice(-6).filter(x=>x==="B").length?"P":"B"]
];

const ROWS=6,COLS=40,STEP=7;
let history=[],h=[],playCnt=Array(9).fill(0),winCnt=Array(9).fill(0),
mark=Array.from({length:9},()=>[]),
big=Array.from({length:ROWS},()=>Array(COLS).fill("")),
bead=[],bc=0,br=0,last=null;
colorMajorHistory=[];
let robotHistory = [];
let globalMaxPercent = 0;   // 👈 เพิ่มตัวนี้

const box=document.getElementById("systems");
SYSTEMS.forEach((s,i)=>{
box.innerHTML+=`
<div class="sys" id="row${i}">
 <div class="name">${s[0]}</div>
 <div class="bet" id="bet${i}">-</div>
 <div class="pair" id="pair${i}">P 0 / B 0</div>
 <div class="hist" id="hist${i}"></div>
</div>`});

function play(v){history.push(v);rebuild();}

/* 🔥 วางตรงนี้ */
function calcRobotSide(history){

 const clean = history.filter(x=>x!=="T");

 let short=0, mid=0, long=0;

 clean.slice(-3).forEach(v=>{
  if(v==="P") short++;
  if(v==="B") short--;
 });

 clean.slice(-6).forEach(v=>{
  if(v==="P") mid++;
  if(v==="B") mid--;
 });

 clean.slice(-12).forEach(v=>{
  if(v==="P") long++;
  if(v==="B") long--;
 });

 const score = short*3 + mid*2 + long*1;

 let side=null;
 if(score>0) side="P";
 else if(score<0) side="B";

 const confidence = Math.min(100, Math.abs(score)*8);

 return { side, confidence };
}

/* 👇 replay อยู่หลังจากนี้ */
function replay(v){

  /* 1️⃣ กัน Tie */
  if(v==="T"){
    h.push("T");
    bead.push("T");
    addBig(v);
    return;
  }

  /* 2️⃣ คำนวณก่อน push */

  // SYSTEM PREDICT
const cleanH = h.filter(x=>x!=="T");
const preds = SYSTEMS.map(s=>s[1](cleanH));;

  // COLOR MAJOR
  let countP=0,countB=0;
  preds.forEach(p=>{
    if(p==="P") countP++;
    if(p==="B") countB++;
  });

  let majorSide=null;
  if(countP>countB) majorSide="P";
  else if(countB>countP) majorSide="B";

  // 🤖 ROBOT (เรียกฟังก์ชันที่คุณสร้าง)
  const robotData = calcRobotSide(h);
const robotPred = robotData.side;

  /* 3️⃣ PUSH ผลจริง */
  h.push(v);

  /* 4️⃣ VALIDATE SYSTEM */
  preds.forEach((p,i)=>{
    if(!p) return;

    playCnt[i]++;

    if(p===v){
      winCnt[i]++;
      mark[i].push("/");
    }else{
      mark[i].push("x");
    }

    if(mark[i].length>14) mark[i].shift();
  });

  /* 5️⃣ VALIDATE COLOR MAJOR */
  if(majorSide){
    if(v===majorSide)
      colorMajorHistory.push("W");
    else
      colorMajorHistory.push("L");

    if(colorMajorHistory.length>20)
      colorMajorHistory.shift();
  }

  /* 6️⃣ VALIDATE ROBOT (กรอง T ออกจากการคิดแพ้ชนะ) */
if(robotPred && v !== "T"){

  if(v === robotPred)
    robotHistory.push("W");
  else
    robotHistory.push("L");

  if(robotHistory.length > 15)
    robotHistory.shift();
}

  /* 7️⃣ UPDATE ROAD */
  addBig(v);
  bead.push(v);
}

function rebuild(){resetState();history.forEach(v=>replay(v));draw();}
function undo(){if(!history.length)return;history.pop();rebuild();}
function clearAll(){history=[];resetState();draw();}

function resetState(){
 h=[];
 playCnt.fill(0);
 winCnt.fill(0);

 mark=Array.from({length:9},()=>[]);
 big=Array.from({length:ROWS},()=>Array(COLS).fill(""));
 bead=[];
 bc=0;
 br=0;
 last=null;

 colorMajorHistory=[];
 robotHistory=[];   // 👈 🔥 ต้องเพิ่มบรรทัดนี้
}

function addBig(v){
 if(!last){big[0][0]=v;last=v;return;}
 if(v===last){
  if(br+1<ROWS&&!big[br+1][bc])br++;
  else{bc++;br=0;}
 }else{bc++;br=0;}
 if(bc>=COLS){
  for(let r=0;r<ROWS;r++)big[r].shift(),big[r].push("");
  bc=COLS-1;
 }
big[br][bc]=v;last=v;
}

  function draw(){

 let sumP=0,sumB=0,maxPct=0;
 let countP=0,countB=0;

// 🔥 กรอง T ออกก่อน
const cleanH = h.filter(x=>x!=="T");

SYSTEMS.forEach((s,i)=>{
  const pred = s[1](cleanH);

  if(pred==="P") countP++;
  if(pred==="B") countB++;

  const pct = playCnt[i]
    ? Math.round(winCnt[i]/playCnt[i]*100)
    : 0;

  maxPct = Math.max(maxPct,pct);
  const opp = 100-pct;

  document.getElementById("bet"+i).textContent = pred || "-";

  document.getElementById("pair"+i).textContent =
    pred==="P"
      ? `P ${pct} / B ${opp}`
      : `P ${opp} / B ${pct}`;

  if(pred==="P") sumP += pct;
  if(pred==="B") sumB += pct;

  document.getElementById("hist"+i).innerHTML =
    mark[i].map(m=>
      `<span style="color:${m=="/"?"#16a34a":"#dc2626"}">${m}</span>`
    ).join("");

  document.getElementById("row"+i)
    .classList.toggle("radar",pct===maxPct && maxPct>0);
 });

 /* ===== COLOR MAJOR ===== */
const colorBox = document.getElementById("colorMajorBox");
colorBox.classList.remove("p","b");

let majorSide = null;

if(countP > countB){
  majorSide = "P";
  colorBox.classList.add("p");
}
else if(countB > countP){
  majorSide = "B";
  colorBox.classList.add("b");
}

const totalSystems = countP + countB || 1;
const percentP = Math.round(countP/totalSystems*100);
const percentB = 100 - percentP;
// ===== คำนวณ Robot % ล่วงหน้า =====
let totalRobot = robotHistory.length;
let winRobot = robotHistory.filter(x => x === "W").length;
let winPercent = totalRobot
  ? Math.round(winRobot / totalRobot * 100)
  : 0;
let losePercent = 100 - winPercent;

// ===== หา % สูงสุดจาก 4 ค่า =====
globalMaxPercent = Math.max(percentP, percentB, winPercent, losePercent);

let html = "";

if(majorSide){
  html += `สายสีมาก : ${majorSide} (${majorSide==="P"?countP:countB} สาย)`;
}else{
  html += `สายสีมาก : เสมอ (${countP}/${countB})`;
}


html += `
<div class="percentRow">
  🔵 P <span class="${percentP===globalMaxPercent?'percentBlink':''}">
    ${percentP}%
  </span>
  |
  🔴 B <span class="${percentB===globalMaxPercent?'percentBlink':''}">
    ${percentB}%
  </span>
</div>
`;

/* ===== ผลล่าสุด ===== */

const lastWL = colorMajorHistory.at(-1);

const winCount =
  colorMajorHistory.filter(x=>x==="W").length;

const totalPlay = colorMajorHistory.length;

const acc = totalPlay
  ? Math.round(winCount/totalPlay*100)
  : 0;



let resultText = "";
let resultColor = "#94a3b8";

if(lastWL==="W"){
  resultText="✔ ชนะ";
  resultColor="#22c55e";
}
else if(lastWL==="L"){
  resultText="✖ แพ้";
  resultColor="#ef4444";
}

html += `
<div class="resultRow ${lastWL==="W"?"win":"lose"}">
  ${resultText}  •  ความแม่นยำ ${acc}%
</div>
`;

html += `<div class="colorMajorHistory">`;

colorMajorHistory.forEach(r=>{
  html += `
    <div class="cmBox ${r==="W"?"cmWin":"cmLose"}">
      ${r==="W"?"✔":"✖"}
    </div>
  `;
});

html += `</div>`;

colorBox.innerHTML = html;


 /* ===== TOP BAR ===== */
 const total = sumP+sumB || 1;
 const pPct = Math.round(sumP/total*100);
 const bPct = 100-pPct;

const bar=document.getElementById("betbar");
bar.textContent=`P ${pPct} / B ${bPct}`;
bar.classList.remove("radarP","radarB");
if(pPct>bPct) bar.classList.add("radarP");
else if(bPct>pPct) bar.classList.add("radarB");


/* ===== 🤖 AI LOGIC ===== */

const robotBox = document.getElementById("robotBox");
robotBox.classList.remove("p","b");

const robotData = calcRobotSide(h);

const side = robotData.side;
const confidence = robotData.confidence;

if(side==="P"){
  robotBox.classList.add("p");
}
else if(side==="B"){
  robotBox.classList.add("b");
}

/* ===== 🔥 CALCULATE P/B CONFIDENCE ===== */
/* ===== 🔥 REAL ACCURACY BASED ON HISTORY ===== */

let loseRobot = totalRobot - winRobot;


let robotHTML = "";   // 👈 เพิ่มบรรทัดนี้

/* ===== แสดงผลแบบ 60 B / 40 P ===== */

const maxRobotPercent = Math.max(winPercent, losePercent);

if(side){
 robotHTML += `
 🤖 Robot AI :
 <span class="${winPercent===globalMaxPercent?'percentBlink':''}">
   ${winPercent}%
 </span> ${side}
 /
 <span class="${losePercent===globalMaxPercent?'percentBlink':''}">
   ${losePercent}%
 </span> ${side==="P"?"B":"P"}
 `;
}else{
 robotHTML += `🤖 Robot AI : -`;
}

robotHTML += `
<div class="robotConfidence">
 ✔ ถูก ${winRobot} ครั้ง
</div>

<div class="robotConfidence">
 ✖ ผิด ${loseRobot} ครั้ง
</div>

<div class="robotMode">
 🎯 ค่าความแม่นยำจริง ${winPercent}%
</div>
`;

robotHTML += `<div class="robotHistory">`;

robotHistory.forEach(r=>{
 robotHTML += `
  <div class="robotDot ${r==="W"?"robotWin":"robotLose"}">
   ${r==="W"?"✔":"✖"}
  </div>
 `;
});

robotHTML += `</div>`;

robotBox.innerHTML = robotHTML;

/* ===== UPDATE COUNT BAR ===== */

let pCount = history.filter(x=>x==="P").length;
let bCount = history.filter(x=>x==="B").length;
let tCount = history.filter(x=>x==="T").length;
let totalCount = history.length;

document.getElementById("count").textContent =
  `P=${pCount}  B=${bCount}  T=${tCount}  TOTAL=${totalCount}`;

/* ===== แล้วค่อยวาดกราฟ ===== */

drawBig();
drawBead();
  }
function drawBig(){
 const c=document.getElementById("big").getContext("2d");
 c.clearRect(0,0,c.canvas.width,c.canvas.height);
 for(let r=0;r<ROWS;r++)for(let x=0;x<COLS;x++)
  if(big[r][x]){
   c.strokeStyle=big[r][x]==="P"?"#3b82f6":"#ef4444";
   c.beginPath();c.arc(x*STEP+STEP,r*STEP+STEP,4,0,Math.PI*2);c.stroke();
 }}
function drawBead(){
 const c=document.getElementById("bead").getContext("2d");
 c.clearRect(0,0,c.canvas.width,c.canvas.height);
 bead.forEach((v,i)=>{
  const r=i%ROWS,x=Math.floor(i/ROWS);
  if(x>=COLS)return;
  c.fillStyle=v==="P"?"#3b82f6":v==="B"?"#ef4444":"#22c55e";
  c.beginPath();c.arc(x*STEP+STEP,r*STEP+STEP,3,0,Math.PI*2);c.fill();
 });
}



</script>

<script>
function resizeCanvas(){
 document.querySelectorAll("canvas").forEach(c=>{
  const ratio=window.devicePixelRatio||1;
  const w=c.clientWidth;
  const h=c.clientHeight;
  c.width=w*ratio;
  c.height=h*ratio;
  const ctx=c.getContext("2d");
  ctx.setTransform(ratio,0,0,ratio,0,0);
 });
 draw();
}
window.addEventListener("resize",resizeCanvas);
resizeCanvas();
</script>
